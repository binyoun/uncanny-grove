<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Uncanny Grove</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #camera-feed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ── start screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(0, 0, 0, 0.85);
      padding: 32px;
      text-align: center;
    }

    #start-screen h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #start-screen p {
      font-size: 0.95rem;
      opacity: 0.6;
      max-width: 280px;
      line-height: 1.6;
    }

    #start-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 14px 40px;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
    }

    #start-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── HUD shown after start ── */
    #hud {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: none;
    }

    #hint {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      opacity: 0.75;
      text-align: center;
      white-space: nowrap;
    }

    /* ── palm ring: appears at palm position ── */
    #palm-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      transform: translate(-50%, -50%);
      display: none;
      pointer-events: none;
    }

    #palm-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    #palm-ring circle.track {
      fill: none;
      stroke: rgba(255,255,255,0.2);
      stroke-width: 3;
    }

    #palm-ring circle.progress {
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      transition: stroke-dashoffset 0.05s linear;
    }

    #status {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <video id="camera-feed" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div id="start-screen">
    <h1>Uncanny Grove</h1>
    <p>Hold your open palm toward the camera to summon the grove.</p>
    <button id="start-btn">Enter</button>
  </div>

  <div id="hud">
    <div id="status">Searching for hand...</div>
    <div id="hint">Show your open palm</div>
    <div id="palm-ring">
      <svg viewBox="0 0 80 80">
        <circle class="track" cx="40" cy="40" r="35" />
        <circle class="progress" cx="40" cy="40" r="35" />
      </svg>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
